spring:
  application:
    name: step
  datasource:
    url: jdbc:mysql://steps-db.ctugymscueef.ap-northeast-2.rds.amazonaws.com:3306/steps_db
    username: admin
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

autoconfigure:
  exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

file:
  upload-dir: ./uploads

jwt:
  secret: mySuperSecretKeyForJwtTokenGeneration1234567890ABCDEF
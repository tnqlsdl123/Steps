spring:
  application:
    name: step

  datasource:
    url: jdbc:mysql://localhost:306/steps_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 7470
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

jwt:
  secret: this-is-a-very-long-secret-key-for-steps-project-1234